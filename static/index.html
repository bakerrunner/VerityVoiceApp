<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VerityVoice</title>
    <link rel="stylesheet" href="/styles.css?v=20260710-slim">
  </head>
  <body>
    <main class="shell">
      <section id="chatPanel" class="chat" aria-label="VerityVoice chat">
        <header class="topbar">
          <div>
            <h1 id="appTitle">VerityVoice</h1>
            <p id="status">Starting...</p>
          </div>
          <div class="actions">
            <button id="textToggle" class="toggle" type="button" aria-pressed="true">Text</button>
            <button id="callToggle" type="button" aria-pressed="false">Call</button>
            <button id="adminOpen" type="button">Admin</button>
          </div>
        </header>

        <div id="callView" class="call-view" aria-hidden="true">
          <div id="callCard" class="call-card">
            <div id="callAvatar" class="call-avatar"></div>
            <div class="call-meta">
              <h2 id="callName">Verity</h2>
              <p id="callStatus">Ready</p>
            </div>
            <div class="call-visual" aria-hidden="true">
              <div class="voice-orb">
                <div class="orb-core"></div>
                <div class="orb-ring"></div>
                <div class="orb-ring orb-ring-2"></div>
              </div>
            </div>
            <div class="call-actions">
              <button id="callMicButton" type="button">Mic</button>
              <button id="endCallButton" class="danger" type="button">End</button>
            </div>
          </div>
        </div>
        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="composer" class="composer">
          <button id="resetChat" class="danger" type="button">New Chat</button>
          <input id="textInput" autocomplete="off" placeholder="Talk to Verity..." aria-label="Message Verity">
          <button id="sendButton" type="submit" class="send">Send</button>
        </form>
      </section>
    </main>

    <dialog id="adminDialog">
      <form method="dialog" class="admin">
        <header>
          <h2>Admin</h2>
          <button id="adminClose" type="submit">Close</button>
        </header>

        <div class="tabs" role="tablist">
          <button class="tab is-active" data-tab="userPanel" type="button">User Settings</button>
          <button class="tab" data-tab="characterPanel" type="button">Character Settings</button>
          <button class="tab" data-tab="technicalPanel" type="button">Technical</button>
        </div>

        <section id="userPanel" class="tab-panel is-active">
          <label>Name <input id="userName" type="text"></label>
          <label>Gender <input id="userGender" type="text"></label>
          <label>Birthdate <input id="userBirthdate" type="date"></label>
          <label>Location <input id="userLocation" type="text" placeholder="City, State"></label>
          <label>Bio <textarea id="userBio" rows="4"></textarea></label>
          <label>System notes <textarea id="userSystemNotes" rows="4"></textarea></label>
        </section>

        <section id="characterPanel" class="tab-panel">
          <label>Name <input id="characterName" type="text"></label>
          <label>Gender <input id="characterGender" type="text"></label>
          <label>Age <input id="characterAge" type="text"></label>
          <label>Bio <textarea id="characterBio" rows="4"></textarea></label>
          <label>System prompt <textarea id="characterSystemPrompt" rows="6"></textarea></label>
          <label>System notes <textarea id="characterSystemNotes" rows="4"></textarea></label>
          <label>Long-term memory / lore <textarea id="characterMemories" rows="8"></textarea></label>
        </section>

        <section id="technicalPanel" class="tab-panel">
          <label>LLM provider
            <select id="llmProvider">
              <option value="lmstudio">LM Studio</option>
              <option value="openrouter">OpenRouter</option>
            </select>
          </label>
          <label>LM Studio URL <input id="lmUrl" type="text"></label>
          <label>LM Studio model <input id="lmModel" type="text"></label>
          <label>OpenRouter API URL <input id="openrouterBaseUrl" type="text" placeholder="https://openrouter.ai/api/v1"></label>
          <label>OpenRouter API key <input id="openrouterKey" type="password" placeholder="Leave blank to keep saved key"></label>
          <label>OpenRouter chat model <input id="openrouterChatModel" type="text" placeholder="e.g. openai/gpt-4.1-mini"></label>
          <label>Temperature <input id="temperature" type="number" min="0" max="2" step="0.05"></label>
          <label class="check"><input id="lmKeepaliveEnabled" type="checkbox">Keep LM Studio warm while VerityVoice is open</label>
          <label>LM Studio keepalive interval seconds <input id="lmKeepaliveInterval" type="number" min="30" step="10"></label>
          <label>Cartesia API key <input id="cartesiaKey" type="password" placeholder="Leave blank to keep saved key"></label>
          <label>Cartesia voice ID <input id="cartesiaVoice" type="text"></label>
          <label>Cartesia model <input id="cartesiaModel" type="text"></label>
          <label>Cartesia STT model <input id="cartesiaSttModel" type="text"></label>
          <label class="check"><input id="fullHistory" type="checkbox">Send full transcript as context</label>
          <label>Context messages when full history is off <input id="maxMessages" type="number" min="4" step="1"></label>
          <label class="check"><input id="fastVoiceContext" type="checkbox">Use faster recent context for voice</label>
          <label>Voice context messages <input id="voiceMessages" type="number" min="4" step="1"></label>
          <label>Carryover turns after New Chat <input id="carryoverTurns" type="number" min="0" step="1"></label>
        </section>

        <button id="saveSettings" class="send" type="button">Save</button>
      </form>
    </dialog>

    <script src="/app.js?v=20260710-slim"></script>
  </body>
</html>
